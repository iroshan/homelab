name: Deploy Docs to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install MkDocs Material
        run: pip install mkdocs-material

      - name: Resolve symlinks in docs/
        run: |
          cp --remove-destination $(readlink -f docs/index.md) docs/index.md
          cp --remove-destination $(readlink -f docs/SETUP-GIT.md) docs/SETUP-GIT.md
          cp --remove-destination -r $(readlink -f docs/plan) docs/plan_real
          rm docs/plan
          mv docs/plan_real docs/plan

      - name: Build MkDocs site
        run: mkdocs build --site-dir site

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Encrypt site with Staticrypt
        run: |
          npm install -g staticrypt
          find site -name "*.html" | xargs staticrypt \
            --password "${{ secrets.STATICRYPT_PASSWORD }}" \
            --short \
            --template-title "Homelab Docs" \
            --template-instructions "Enter the site password to access documentation." \
            --remember 30 \
            --directory site

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: homelab-docs
          directory: site
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}

