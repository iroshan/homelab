name: Deploy Docs to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install MkDocs Material
        run: pip install mkdocs-material

      - name: Resolve symlinks in docs/
        run: |
          cp --remove-destination $(readlink -f docs/index.md) docs/index.md
          cp --remove-destination $(readlink -f docs/SETUP-GIT.md) docs/SETUP-GIT.md
          cp --remove-destination -r $(readlink -f docs/plan) docs/plan_real
          rm docs/plan
          mv docs/plan_real docs/plan

      - name: Build MkDocs site
        run: mkdocs build --site-dir site

      - name: Add Cloudflare Pages Basic Auth Middleware
        run: |
          mkdir -p functions
          cat > functions/_middleware.js << 'EOF'
          export async function onRequest(context) {
            const { request, next, env } = context;
            const authHeader = request.headers.get("Authorization");
            const validPassword = env.STATICRYPT_PASSWORD || "Indika@464";

            if (authHeader) {
              const [scheme, encoded] = authHeader.split(" ");
              if (/^Basic$/i.test(scheme) && encoded) {
                const decoded = atob(encoded);
                const colonIndex = decoded.indexOf(":");
                const pass = colonIndex !== -1 ? decoded.substring(colonIndex + 1) : "";
                if (pass === validPassword) {
                  return await next();
                }
              }
            }

            return new Response("Access Denied: Homelab Documentation is Protected.", {
              status: 401,
              headers: {
                "WWW-Authenticate": 'Basic realm="Homelab Documentation"',
              },
            });
          }
          EOF

      - name: Deploy to Cloudflare Pages
        run: |
          npx wrangler pages project create homelab-docs --production-branch main || true
          npx wrangler pages deploy site \
            --project-name homelab-docs \
            --branch main \
            --commit-dirty=true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

