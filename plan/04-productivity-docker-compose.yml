# =============================================================================
# STACK 4: PRODUCTIVITY
# =============================================================================
# Purpose: Notes and quick captures
# Services: Memos (note-taking), Telegram Bot (integration)
# Deploy: After communication stack
# =============================================================================

services:

  # --- MEMOS (NOTE TAKING) ---
  memos:
    image: neosmemo/memos:0.22.5
    container_name: memos
    restart: unless-stopped
    environment:
      - TZ=Europe/London
    volumes:
      - ./memos_data:/var/opt/memos
    ports:
      - "5230:5230"
    dns:
      - 172.18.0.2
      - 1.1.1.1
      - 8.8.8.8
    networks:
      - productivity_net
      - proxy_net
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # --- TELEGRAM BOT FOR MEMOS ---
  telegram-memos-bot:
    image: telegram-memos-bot:latest
    container_name: telegram_memos_bot
    restart: unless-stopped
    depends_on:
      - memos
    environment:
      - BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - MEMOS_URL=http://memos:5230
      - TZ=Europe/London
    dns:
      - 172.18.0.2
      - 1.1.1.1
      - 8.8.8.8
    networks:
      - productivity_net
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  productivity_net:
    name: productivity_net
    driver: bridge
  
  proxy_net:
    name: proxy_net
    external: true
