# =============================================================================
# STACK 2: NETWORK & ACCESS
# =============================================================================
# Purpose: Reverse Proxy & Container Management
# Deploy: SECOND (after core infrastructure)
# Depends on: Stack 1 (DNS)
# =============================================================================

services:

  # --- REVERSE PROXY & SSL ---
  npm:
    image: 'jc21/nginx-proxy-manager:2.11.3'
    container_name: nginx_proxy_manager
    restart: unless-stopped
    ports:
      - '80:80'
      - '81:81'
      - '443:443'
    environment:
      - TZ=Europe/London
    # Use our AdGuard DNS
    dns:
      - 172.18.0.2  # AdGuard static IP
      - 1.1.1.1
      - 8.8.8.8
    volumes:
      - ./npm/data:/data
      - ./npm/letsencrypt:/etc/letsencrypt
    networks:
      - proxy_net
      - infrastructure_net  # Access to DNS
    healthcheck:
      test: ["CMD", "/bin/check-health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    security_opt:
      - no-new-privileges:true
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # --- CONTAINER MANAGEMENT ---
  portainer:
    image: portainer/portainer-ce:2.21.4
    container_name: portainer
    restart: unless-stopped
    environment:
      - PORTAINER_TUNNEL_ADDR=portainer.iroshan.uk
      - PORTAINER_TRUSTED_ORIGINS=https://portainer.iroshan.uk
    dns:
      - 172.18.0.2
      - 1.1.1.1
      - 8.8.8.8
    security_opt:
      - no-new-privileges:true
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./portainer_data:/data
    ports:
      - "9000:9000"
    command: --http-enabled --trusted-origins portainer.iroshan.uk
    networks:
      - proxy_net
      - infrastructure_net
      # Also add other networks for management access
      - monitoring_net
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  proxy_net:
    name: proxy_net
    driver: bridge
    external: false  # Created by this stack
  
  infrastructure_net:
    name: infrastructure_net
    external: true  # Created by Stack 1
  
  monitoring_net:
    name: monitoring_net
    external: true  # Will be created by Stack 3
