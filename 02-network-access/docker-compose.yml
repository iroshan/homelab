services:

  # NGINX PROXY MANAGER
  npm:
    image: 'jc21/nginx-proxy-manager:2.11.3'
    container_name: nginx_proxy_manager
    restart: unless-stopped
    ports:
      - '80:80'
      - '127.0.0.1:81:81'  # Admin panel — localhost only
      - '443:443'
    environment:
      - TZ=Europe/London
    extends:
      file: ../shared/dns-config.yml
      service: dns-base
    volumes:
      - ./npm/data:/data
      - ./npm/letsencrypt:/etc/letsencrypt
    networks:
      - proxy_net
      - infrastructure_net
    healthcheck:
      test: ["CMD", "/bin/check-health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    security_opt:
      - no-new-privileges:true
    mem_limit: 512m
    mem_reservation: 128m
    cpus: "0.5"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # PORTAINER
  portainer:
    image: portainer/portainer-ce:2.20.2 
    container_name: portainer
    restart: unless-stopped
    environment:
      - TZ=Europe/London
    extends:
      file: ../shared/dns-config.yml
      service: dns-base
    security_opt:
      - no-new-privileges:true
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./portainer_data:/data
    ports:
      - "127.0.0.1:9000:9000"  # Proxied via NPM — localhost only
    networks:
      - proxy_net
      - infrastructure_net
    mem_limit: 256m
    mem_reservation: 64m
    cpus: "0.25"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  proxy_net:
    name: proxy_net
    external: true
    
  infrastructure_net:
    name: infrastructure_net
    external: true
